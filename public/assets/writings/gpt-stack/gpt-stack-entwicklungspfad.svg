<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="720" viewBox="0 0 1700 720" role="img" aria-labelledby="title desc">
<title id="title">GPT-Stack Entwicklungspfad</title>
<desc id="desc">Entwicklung von einzelnen Custom GPTs über den GPT-Stack zu Modellvariation, Meta-Governance und lokalem KI-Ökosystem.</desc>
