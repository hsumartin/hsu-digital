<svg width="100%" viewBox="0 0 680 210" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, BlinkMacSystemFont, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Vier Entscheidungspfade des Decision Layers</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&#34;Anthropic Sans&#34;, -apple-system, BlinkMacSystemFont, &#34;Segoe UI&#34;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Ausgehend von einem bewerteten Anwendungsfall führt der Decision Layer zu vier möglichen Architekturentscheidungen: Keine KI, Begrenzte KI, Unterstützende KI oder Integrierte KI.</desc>
