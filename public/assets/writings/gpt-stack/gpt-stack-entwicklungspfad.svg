<text x="850.0" y="70.0" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#0A1424">Entwicklungspfad des GPT-Stacks</text>
<text x="850.0" y="103.0" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#6B7280">Vom einzelnen Custom GPT zur übertragbaren Agenten- und Portfolioarchitektur</text>
