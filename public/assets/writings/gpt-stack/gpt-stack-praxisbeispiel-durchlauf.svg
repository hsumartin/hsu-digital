<text x="850.0" y="850.0" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="800" fill="#1F4F73">Der Durchlauf ist iterativ, nicht linear.</text>
<text x="850.0" y="877.0" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#6B7280">Die Qualität entsteht nicht in einem einzelnen Schritt, sondern durch die kontrollierte Rückkopplung zwischen Strategie, Governance, Reflexion, Ausarbeitung und Prüfung.</text>
