<text x="850.0" y="623.0" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="650" fill="#1F4F73">Die Architektur bleibt konstant. Rollen, Modelle und Ausführungsformen können schrittweise variieren.</text>
<text x="850.0" y="646.0" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13.5" font-weight="400" fill="#6B7280">Damit wird der GPT-Stack zur Brücke zwischen heutiger Custom-GPT-Nutzung und späterer agentischer Orchestrierung.</text>
